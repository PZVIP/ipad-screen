<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>羽毛球小助手</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255,255,255,0.92);
      --text: #101828;
      --muted: #667085;
      --line: #d0d5dd;
      --primary: #2563eb;
      --primary-soft: rgba(37, 99, 235, 0.1);
      --shadow: 0 16px 40px rgba(16, 24, 40, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top, #eef4ff 0%, #f7f9fc 36%, #f5f7fb 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: 18px 16px 36px;
    }

    .hero {
      padding: 18px 6px 10px;
    }

    .hero h1 {
      margin: 6px 0 8px;
      text-align: center;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 16px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field:last-child { margin-bottom: 0; }

    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .input, .small-input {
      width: 100%;
      border: 1.5px solid var(--line);
      border-radius: 16px;
      background: #fff;
      min-height: 54px;
      font-size: 18px;
      padding: 0 16px;
      color: var(--text);
      outline: none;
      transition: .2s border-color, .2s box-shadow, .2s transform;
      -webkit-appearance: none;
      appearance: none;
    }

    .input:focus, .small-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft);
      transform: translateY(-1px);
    }

    .inline-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .small-input {
      text-align: center;
      padding: 0 8px;
    }

    .inline-text {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .summary {
      margin-top: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 55%, #3b82f6 100%);
      padding: 18px;
      color: #fff;
    }

    .summary-title {
      opacity: .88;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }

    .summary-row:last-child { margin-bottom: 0; }

    .summary-label {
      font-size: 15px;
      opacity: .92;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .summary-sub {
      text-align: right;
      font-size: 15px;
      opacity: .92;
    }

    .pay-card {
      text-align: center;
      padding-top: 22px;
      padding-bottom: 26px;
    }

    .qr-wrap {
      width: min(78vw, 280px);
      aspect-ratio: 1 / 1;
      margin: 6px auto 16px;
      border-radius: 24px;
      border: 1px dashed #c7d7fe;
      background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 14px;
    }

    .qr-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 16px;
      background: #fff;
    }

    .hint {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>羽毛球小助手</h1>
      <p>输入场地费、每桶球总价、用了几个球和人数，自动算出总费用与每人分摊金额。</p>
    </section>

    <section class="card">
      <div class="field">
        <label class="label" for="venue">场地费</label>
        <input id="venue" class="input" type="number" inputmode="decimal" placeholder="例如 40" />
      </div>

      <div class="field">
        <label class="label">球费</label>
        <div class="inline-grid">
          <input id="bucketPrice" class="small-input" type="number" inputmode="decimal" placeholder="48" />
          <span class="inline-text">元 / 桶，用</span>
          <input id="shuttleUsed" class="small-input" type="number" inputmode="numeric" placeholder="6" />
          <span class="inline-text">个</span>
        </div>
      </div>

      <div class="field">
        <label class="label" for="people">人数</label>
        <input id="people" class="input" type="number" inputmode="numeric" placeholder="例如 6" />
      </div>

      <div class="summary" aria-live="polite">
        <div class="summary-title">自动计算</div>
        <div class="summary-row">
          <span class="summary-label">共计</span>
          <span id="totalText" class="summary-value">0 元</span>
        </div>
        <div class="summary-sub" id="perText">每人 0 元</div>
      </div>
    </section>

    <section class="card pay-card">
      <div class="qr-wrap">
        <img src="https://placehold.co/800x800/png?text=%E4%BB%98%E6%AC%BE%E7%A0%81" alt="付款码占位图" />
      </div>
      <p class="hint">手机长按识别二维码付款<br />如需换成真实收款码，把图片发我即可替换。</p>
    </section>

    <div class="footer">临时分享页 · 手机网页适配</div>
  </main>

  <script>
    const venue = document.getElementById('venue');
    const bucketPrice = document.getElementById('bucketPrice');
    const shuttleUsed = document.getElementById('shuttleUsed');
    const people = document.getElementById('people');
    const totalText = document.getElementById('totalText');
    const perText = document.getElementById('perText');
    const SHUTTLES_PER_BUCKET = 12;

    const format = (n) => {
      if (!Number.isFinite(n)) return '0';
      const rounded = Math.round((n + Number.EPSILON) * 100) / 100;
      return Number.isInteger(rounded)
        ? String(rounded)
        : rounded.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
    };

    function calc() {
      const venueFee = parseFloat(venue.value) || 0;
      const pricePerBucket = parseFloat(bucketPrice.value) || 0;
      const used = parseFloat(shuttleUsed.value) || 0;
      const count = parseFloat(people.value) || 0;
      const shuttleFee = pricePerBucket * (used / SHUTTLES_PER_BUCKET);
      const total = venueFee + shuttleFee;
      const per = count > 0 ? total / count : 0;

      totalText.textContent = `${format(total)} 元`;
      perText.textContent = count > 0 ? `每人 ${format(per)} 元` : '每人 0 元';
    }

    [venue, bucketPrice, shuttleUsed, people].forEach(el => {
      el.addEventListener('input', calc);
      el.addEventListener('change', calc);
    });

    venue.value = '40';
    bucketPrice.value = '48';
    shuttleUsed.value = '6';
    people.value = '6';
    calc();
  </script>
</body>
</html>
