<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>推荐使用微信支付</title>
  <style>
    :root {
      --wechat-green: #16c45b;
      --bg: #f6f6f6;
      --text: #111111;
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--wechat-green) 0%, #18c45e 58%, #1cc663 100%);
      position: relative;
      overflow: hidden;
    }

    .page::after {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: 132px;
      height: 180px;
      background: var(--bg);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      transform: scaleX(1.05);
      z-index: 0;
    }

    .inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top, 0px) + 28px) 20px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title {
      margin: 8px 0 28px;
      color: #fff;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
      text-align: center;
    }

    .pay-card {
      width: 100%;
      max-width: 320px;
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 20px 18px 16px;
      text-align: center;
    }

    .qr-shell {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .qr-shell img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .calc-panel {
      width: 100%;
      max-width: 360px;
      margin-top: 30px;
      padding: 0 4px;
      color: #222;
    }

    .amount-box {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 6px;
      margin-bottom: 18px;
      color: #222;
    }

    .amount-box .currency {
      font-size: 26px;
      font-weight: 600;
    }

    .amount-box .value {
      font-size: 52px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .desc {
      text-align: center;
      color: #666;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .form {
      background: rgba(255,255,255,0.94);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      min-width: 86px;
      font-size: 16px;
      color: #222;
    }

    .input,
    .mini-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 18px;
      color: #111;
      width: 100%;
      text-align: right;
      -webkit-appearance: none;
      appearance: none;
    }

    .combo {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 0;
      flex-wrap: nowrap;
    }

    .mini-input {
      width: 62px;
      padding: 0;
    }

    .unit {
      color: #666;
      font-size: 14px;
      white-space: nowrap;
    }

    .summary {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .summary-card {
      background: rgba(255,255,255,0.94);
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }

    .summary-card .k {
      color: #666;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .summary-card .v {
      color: #111;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
    }

    .wechat-brand {
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding-top: 42px;
      text-align: center;
      color: #2c2c2c;
      width: 100%;
    }

    .wechat-brand .logo {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .wechat-brand .text {
      font-size: 32px;
      font-weight: 500;
    }

    @media (max-width: 375px) {
      .title { font-size: 24px; }
      .amount-box .value { font-size: 46px; }
      .label { min-width: 74px; }
      .mini-input { width: 52px; }
      .wechat-brand .text { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="inner">
      <h1 class="title">推荐使用微信支付</h1>

      <section class="pay-card">
        <div class="qr-shell">
          <img alt="微信收款码" src="qrcode.jpg" />
        </div>
      </section>

      <section class="calc-panel">
        <div class="amount-box">
          <span class="currency">¥</span>
          <span class="value" id="perAmount">0</span>
        </div>
        <div class="desc">羽毛球 AA 收款 · 自动计算每人应付金额</div>

        <div class="form">
          <div class="row">
            <div class="label">场地费</div>
            <input id="venue" class="input" type="number" inputmode="decimal" placeholder="输入金额" />
          </div>
          <div class="row">
            <div class="label">球费</div>
            <div class="combo">
              <input id="bucketPrice" class="mini-input" type="number" inputmode="decimal" placeholder="48" />
              <span class="unit">元/桶，用</span>
              <input id="shuttleUsed" class="mini-input" type="number" inputmode="numeric" placeholder="6" />
              <span class="unit">个</span>
            </div>
          </div>
          <div class="row">
            <div class="label">人数</div>
            <input id="people" class="input" type="number" inputmode="numeric" placeholder="输入人数" />
          </div>
        </div>

        <div class="summary">
          <div class="summary-card">
            <div class="k">总费用</div>
            <div class="v" id="totalAmount">¥ 0</div>
          </div>
          <div class="summary-card">
            <div class="k">每人应付</div>
            <div class="v" id="splitAmount">¥ 0</div>
          </div>
        </div>
      </section>

      <div class="wechat-brand">
        <div class="logo">💬</div>
        <div class="text">微信支付</div>
      </div>
    </div>
  </main>

  <script>
    const venue = document.getElementById('venue');
    const bucketPrice = document.getElementById('bucketPrice');
    const shuttleUsed = document.getElementById('shuttleUsed');
    const people = document.getElementById('people');
    const perAmount = document.getElementById('perAmount');
    const totalAmount = document.getElementById('totalAmount');
    const splitAmount = document.getElementById('splitAmount');
    const SHUTTLES_PER_BUCKET = 12;

    const format = (n) => {
      if (!Number.isFinite(n)) return '0';
      const rounded = Math.round((n + Number.EPSILON) * 100) / 100;
      return Number.isInteger(rounded)
        ? String(rounded)
        : rounded.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
    };

    function calc() {
      const venueFee = parseFloat(venue.value) || 0;
      const pricePerBucket = parseFloat(bucketPrice.value) || 0;
      const used = parseFloat(shuttleUsed.value) || 0;
      const count = parseFloat(people.value) || 0;
      const shuttleFee = pricePerBucket * (used / SHUTTLES_PER_BUCKET);
      const total = venueFee + shuttleFee;
      const per = count > 0 ? total / count : 0;

      perAmount.textContent = format(per);
      totalAmount.textContent = `¥ ${format(total)}`;
      splitAmount.textContent = `¥ ${format(per)}`;
    }

    [venue, bucketPrice, shuttleUsed, people].forEach((el) => {
      el.addEventListener('input', calc);
      el.addEventListener('change', calc);
    });

    venue.value = '40';
    bucketPrice.value = '48';
    shuttleUsed.value = '6';
    people.value = '6';
    calc();
  </script>
</body>
</html>
