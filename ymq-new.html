<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>羽毛球活动收款</title>
    <style>
      :root {
        --wechat: #07c160;
        --wechat-dark: #05a957;
        --bg: #f5f6f7;
        --card: #ffffff;
        --soft: #f6f7f8;
        --text: #17191d;
        --muted: #8b9098;
        --line: #edf0f2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
      }

      body {
        color: var(--text);
        font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .page {
        width: min(760px, 100%);
        margin: 0 auto;
        min-height: 100dvh;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
        background: var(--bg);
      }

      .hero {
        padding: 22px 22px 76px;
        color: #fff;
        text-align: center;
        background: linear-gradient(180deg, #14d56f 0%, var(--wechat) 100%);
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 6vw, 44px);
        line-height: 1.08;
        font-weight: 900;
        letter-spacing: 0;
      }

      .main-amount {
        margin-top: 16px;
      }

      .amount-label {
        font-size: 19px;
        font-weight: 600;
        opacity: 0.92;
      }

      .amount-value {
        display: block;
        margin-top: 0;
        font-size: clamp(48px, 11vw, 76px);
        line-height: 1;
        font-weight: 900;
        letter-spacing: -1px;
      }

      .amount-tip {
        margin: 12px 0 0;
        font-size: 15px;
        opacity: 0.82;
      }

      .content {
        margin-top: -54px;
        padding: 0 16px;
        display: grid;
        gap: 10px;
      }

      .card {
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 10px 30px rgba(32, 38, 46, 0.06);
        overflow: hidden;
      }

      .qr-card {
        padding: 16px 18px 14px;
        text-align: center;
      }

      .pay-recommend {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        color: var(--text);
        font-size: 20px;
        font-weight: 800;
      }

      .wechat-dot {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #fff;
        background: var(--wechat);
        font-size: 18px;
        font-weight: 900;
      }

      .qr-box {
        position: relative;
        display: block;
        width: min(36%, 230px);
        min-width: 132px;
        aspect-ratio: 1;
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        overflow: hidden;
        cursor: pointer;
      }

      .qr-placeholder {
        position: absolute;
        inset: 10px;
        border-radius: 12px;
        background:
          radial-gradient(circle at 73% 20%, #d5d9dc 0 9%, transparent 9.5%),
          linear-gradient(33deg, #07c160 0 43%, transparent 43.5%),
          linear-gradient(151deg, transparent 0 53%, #22c982 53.5% 100%),
          linear-gradient(22deg, transparent 0 58%, #40a9ff 58.5% 100%),
          #f7faf9;
      }

      .qr-box img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
        background: #fff;
      }

      .qr-box.has-image .qr-placeholder {
        display: none;
      }

      .qr-box.has-image img {
        display: block;
      }

      .qr-box input {
        display: none;
      }

      .qr-tip {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
      }

      .mode-card {
        padding: 8px;
      }

      .capture-source .mode-card,
      .capture-source .generate-action {
        display: none;
      }

      .mode-switch {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        border-radius: 18px;
        background: var(--soft);
        padding: 5px;
      }

      .mode-btn {
        min-height: 38px;
        border: 0;
        border-radius: 14px;
        color: #697077;
        background: transparent;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
      }

      .mode-btn.active {
        color: #fff;
        background: var(--wechat);
      }

      .form-card {
        padding: 0;
      }

      .input-row {
        min-height: 50px;
        padding: 0 24px;
        display: grid;
        grid-template-columns: 88px 1fr;
        align-items: center;
        gap: 4px;
        border-bottom: 1px solid var(--line);
        font-size: 17px;
        font-weight: 400;
        white-space: nowrap;
      }

      .input-row > span:first-child {
        font-size: 19px;
        font-weight: 400;
        color: var(--text);
      }

      .row-content {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 4px;
        min-width: 0;
        font-weight: 400;
        white-space: nowrap;
      }

      .input-row:last-child {
        border-bottom: 0;
      }

      .people-row.equal .female-person {
        display: none;
      }

      .people-row.equal {
        justify-content: flex-start;
      }

      .inline-input {
        width: 5ch;
        height: 32px;
        margin: 0 3px;
        border: 0;
        border-bottom: 2px solid #d7dde1;
        border-radius: 0;
        color: var(--text);
        background: transparent;
        outline: none;
        font-size: 17px;
        font-weight: 400;
        text-align: center;
        appearance: textfield;
      }

      .inline-input:focus {
        border-bottom-color: var(--wechat);
      }

      .inline-input.short {
        /* 移除特定的宽度覆盖，统一使用 4 个数字宽度 */
      }

      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        margin: 0;
        appearance: none;
      }

      .derived-pill {
        margin-left: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        color: var(--wechat-dark);
        background: #e9f8ef;
        font-size: 15px;
        font-weight: 500;
      }

      .result-card {
        padding: 18px 20px;
      }

      .result-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .result-title {
        margin: 0;
        font-size: 20px;
        font-weight: 800;
      }

      .auto-badge {
        padding: 7px 12px;
        border-radius: 999px;
        color: var(--wechat-dark);
        background: #dff8e9;
        font-size: 13px;
        font-weight: 800;
      }

      .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .result-grid.equal {
        grid-template-columns: 1fr;
      }

      .result-box {
        min-height: 92px;
        padding: 14px;
        border-radius: 20px;
        background: var(--soft);
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }

      .result-box.hidden {
        display: none;
      }

      .result-box span {
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
      }

      .result-box strong {
        margin-top: 5px;
        font-size: clamp(28px, 6vw, 40px);
        line-height: 1;
        font-weight: 900;
      }

      .footer {
        padding: 8px 0 0;
        color: #7a8088;
        text-align: center;
        font-size: 14px;
      }

      .generate-btn {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 18px;
        color: #fff;
        background: var(--wechat);
        cursor: pointer;
        font-size: 16px;
        font-weight: 800;
      }

      .generate-btn:active {
        background: var(--wechat-dark);
      }

      .generate-action {
        padding: 2px 0 0;
      }

      .image-preview {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        padding: max(10px, env(safe-area-inset-top)) 12px max(10px, env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.72);
        overflow: auto;
        text-align: center;
      }

      .image-preview.show {
        display: block;
      }

      .preview-close {
        position: sticky;
        top: 0;
        margin: 0 auto 8px;
        min-height: 36px;
        border: 0;
        border-radius: 999px;
        padding: 0 18px;
        color: #fff;
        background: rgba(255, 255, 255, 0.18);
        font-size: 15px;
        font-weight: 800;
      }

      .image-preview img {
        width: auto;
        max-width: 100%;
        max-height: calc(100dvh - 82px);
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.26);
        background: #fff;
      }

      .image-preview p {
        margin: 10px 0 0;
        color: rgba(255, 255, 255, 0.86);
        font-size: 14px;
        font-weight: 700;
      }

      @media (max-width: 560px) {
        .hero {
          padding: 20px 18px 72px;
        }

        .amount-label {
          font-size: 18px;
        }

        .amount-tip {
          font-size: 14px;
        }

        .content {
          margin-top: -50px;
          padding: 0 12px;
          gap: 9px;
        }

        .card {
          border-radius: 22px;
        }

        .qr-card {
          padding: 14px 16px 12px;
        }

        .pay-recommend {
          font-size: 18px;
        }

        .qr-box {
          width: min(36%, 190px);
          min-width: 122px;
        }

        .input-row {
          min-height: 50px;
          padding: 0 16px;
          grid-template-columns: 72px 1fr;
          flex-wrap: wrap;
          row-gap: 4px;
          font-size: 16px;
          white-space: normal;
        }

        .input-row > span:first-child {
          font-size: 18px;
        }

        .row-content {
          flex-wrap: wrap;
          justify-content: flex-end;
          row-gap: 4px;
          white-space: normal;
        }

        .inline-input {
          width: 5ch;
          height: 30px;
          font-size: 16px;
        }

        .inline-input.short {
          /* 统一宽度 */
        }

        .derived-pill {
          margin-left: 4px;
          font-size: 15px;
        }

        .result-card {
          padding: 16px;
        }

        .result-grid {
          gap: 10px;
        }

        .result-box {
          min-height: 88px;
          padding: 14px;
        }

        .result-box span {
          font-size: 13px;
        }
      }

      @media (max-width: 390px) {
        .input-row {
          font-size: 15px;
        }

        .inline-input {
          width: 5ch;
          font-size: 16px;
        }

        .inline-input.short {
          /* 统一宽度 */
        }

        .result-grid:not(.equal) {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>羽毛球活动收款</h1>
        <div class="main-amount">
          <span class="amount-label" id="mainAmountLabel">男生 / 女生</span>
          <strong class="amount-value" id="mainAmountText">¥0</strong>
        </div>
        <p class="amount-tip">填写人数和费用后自动计算应付金额</p>
      </section>

      <section class="content">
        <section class="card qr-card">
          <div class="pay-recommend">
            <span class="wechat-dot">微</span>
            <span>推荐使用微信支付</span>
          </div>
          <label class="qr-box has-image" id="qrBox" title="点击切换收款二维码">
            <span class="qr-placeholder"></span>
            <img id="qrPreview" src="qr.png" alt="收款二维码" />
            <input id="qrInput" type="file" accept="image/*" />
          </label>
          <p class="qr-tip">长按识别二维码付款</p>
        </section>

        <section class="card mode-card">
          <div class="mode-switch" aria-label="分摊模式">
            <button class="mode-btn" id="equalModeBtn" type="button">男女平等</button>
            <button class="mode-btn active" id="halfModeBtn" type="button">女生球费减半</button>
          </div>
        </section>

        <section class="card form-card">
          <div class="input-row">
            <span>场地：</span>
            <div class="row-content">
              <input class="inline-input short" id="courtCount" type="number" min="0" max="999" step="1" />
              <span>小时场地，</span>
              <input class="inline-input" id="hourlyPrice" type="number" min="0" max="999" step="1" />
              <span>元/时，共</span>
              <span class="derived-pill" id="courtTotalPreview">0 元</span>
            </div>
          </div>

          <div class="input-row">
            <span>球费：</span>
            <div class="row-content">
              <input class="inline-input" id="tubePrice" type="number" min="0" max="999" step="1" />
              <span>元/桶，用</span>
              <input class="inline-input short" id="usedBalls" type="number" min="0" max="999" step="1" />
              <span>个，共</span>
              <span class="derived-pill" id="ballTotalPreview">0 元</span>
            </div>
          </div>

          <div class="input-row people-row" id="peopleRow">
            <span id="peoplePrimaryLabel">男生：</span>
            <div class="row-content">
              <input class="inline-input short" id="maleCount" type="number" min="0" max="999" step="1" />
              <span>人</span>
              <span class="female-person">女生：</span>
              <input class="inline-input short female-person" id="femaleCount" type="number" min="0" max="999" step="1" />
              <span class="female-person">人</span>
            </div>
          </div>
        </section>

        <section class="card result-card">
          <div class="result-head">
            <h2 class="result-title">费用结果</h2>
            <span class="auto-badge">自动计算</span>
          </div>
          <div class="result-grid" id="payGrid">
            <div class="result-box" id="malePayCard">
              <span id="malePayLabel">男生每人</span>
              <strong id="malePayText">¥0</strong>
            </div>
            <div class="result-box" id="femalePayCard">
              <span>女生每人</span>
              <strong id="femalePayText">¥0</strong>
            </div>
          </div>
        </section>

        <footer class="footer">微信支付</footer>

        <section class="generate-action">
          <button class="generate-btn" id="generateImageBtn" type="button">生成图片</button>
        </section>
      </section>
    </main>

    <section class="image-preview" id="imagePreview" aria-label="生成的收款图片">
      <button class="preview-close" id="closePreviewBtn" type="button">关闭预览</button>
      <img id="generatedImage" alt="生成的羽毛球活动收款图片" />
      <p>长按图片保存，或转发到微信群</p>
    </section>

    <script>
      const fields = {
        courtCount: document.getElementById("courtCount"),
        hourlyPrice: document.getElementById("hourlyPrice"),
        tubePrice: document.getElementById("tubePrice"),
        usedBalls: document.getElementById("usedBalls"),
        maleCount: document.getElementById("maleCount"),
        femaleCount: document.getElementById("femaleCount"),
      };

      const modeButtons = {
        equal: document.getElementById("equalModeBtn"),
        half: document.getElementById("halfModeBtn"),
      };

      const output = {
        mainAmountLabel: document.getElementById("mainAmountLabel"),
        mainAmountText: document.getElementById("mainAmountText"),
        peopleRow: document.getElementById("peopleRow"),
        peoplePrimaryLabel: document.getElementById("peoplePrimaryLabel"),
        payGrid: document.getElementById("payGrid"),
        malePayCard: document.getElementById("malePayCard"),
        femalePayCard: document.getElementById("femalePayCard"),
        malePayLabel: document.getElementById("malePayLabel"),
        malePayText: document.getElementById("malePayText"),
        femalePayText: document.getElementById("femalePayText"),
        courtTotalPreview: document.getElementById("courtTotalPreview"),
        ballTotalPreview: document.getElementById("ballTotalPreview"),
      };

      const generateImageBtn = document.getElementById("generateImageBtn");
      const imagePreview = document.getElementById("imagePreview");
      const closePreviewBtn = document.getElementById("closePreviewBtn");
      const generatedImage = document.getElementById("generatedImage");

      let splitMode = "half";

      function numberValue(input) {
        const value = Number(input.value);
        return Number.isFinite(value) && value > 0 ? value : 0;
      }

      function money(value) {
        if (!Number.isFinite(value)) return "0";
        return Number.isInteger(value) ? String(value) : value.toFixed(2);
      }

      function yuan(value) {
        return `¥${money(value)}`;
      }

      function calculate() {
        const courtCount = numberValue(fields.courtCount);
        const hourlyPrice = numberValue(fields.hourlyPrice);
        const tubePrice = numberValue(fields.tubePrice);
        const usedBalls = numberValue(fields.usedBalls);
        const maleCount = numberValue(fields.maleCount);
        const femaleCount = numberValue(fields.femaleCount);
        const courtTotal = courtCount * hourlyPrice;
        const ballTotal = (tubePrice / 12) * usedBalls;
        const peopleCount = splitMode === "equal" ? maleCount : maleCount + femaleCount;
        const ballUnits = splitMode === "half" ? maleCount + femaleCount * 0.5 : peopleCount;

        const courtEach = peopleCount > 0 ? courtTotal / peopleCount : 0;
        const maleBallEach = ballUnits > 0 ? ballTotal / ballUnits : 0;
        const femaleBallEach = splitMode === "half" ? maleBallEach * 0.5 : maleBallEach;
        const grandTotal = courtTotal + ballTotal;
        const malePay = courtEach + maleBallEach;
        const femalePay = courtEach + femaleBallEach;
        const equalPay = peopleCount > 0 ? grandTotal / peopleCount : 0;

        output.courtTotalPreview.textContent = `${money(courtTotal)} 元`;
        output.ballTotalPreview.textContent = `${money(ballTotal)} 元`;
        output.peopleRow.classList.toggle("equal", splitMode === "equal");
        output.peoplePrimaryLabel.textContent = splitMode === "equal" ? "人数：" : "男生：";
        output.payGrid.classList.toggle("equal", splitMode === "equal");
        output.femalePayCard.classList.toggle("hidden", splitMode === "equal");
        output.malePayLabel.textContent = splitMode === "equal" ? "每人应付" : "男生每人";
        output.malePayText.textContent = yuan(splitMode === "equal" ? equalPay : malePay);
        output.femalePayText.textContent = yuan(femalePay);

        if (splitMode === "equal") {
          output.mainAmountLabel.textContent = "";
          output.mainAmountText.textContent = `${yuan(equalPay)} 人均`;
        } else {
          output.mainAmountLabel.textContent = "男 / 女";
          output.mainAmountText.textContent = `${yuan(malePay)} / ${yuan(femalePay)}`;
        }
      }

      function setMode(nextMode) {
        splitMode = nextMode;
        modeButtons.equal.classList.toggle("active", splitMode === "equal");
        modeButtons.half.classList.toggle("active", splitMode === "half");
        calculate();
      }

      Object.values(fields).forEach((field) => {
        field.addEventListener("input", calculate);
      });

      modeButtons.equal.addEventListener("click", () => setMode("equal"));
      modeButtons.half.addEventListener("click", () => setMode("half"));

      calculate();

      document.getElementById("qrInput").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        const preview = document.getElementById("qrPreview");
        const box = document.getElementById("qrBox");
        reader.addEventListener("load", () => {
          preview.src = reader.result;
          box.classList.add("has-image");
        });
        reader.readAsDataURL(file);
      });

      async function generateReceiptImage() {
        const canvas = await renderCurrentPageCanvas();
        generatedImage.src = canvas.toDataURL("image/png");
        imagePreview.classList.add("show");
      }

      function readImage(src) {
        return new Promise((resolve) => {
          if (!src) {
            resolve(null);
            return;
          }
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => resolve(null);
          image.src = src;
        });
      }

      async function renderCurrentPageCanvas() {
        const page = document.querySelector(".page");
        const clone = page.cloneNode(true);
        clone.classList.add("capture-source");
        clone.querySelectorAll("input").forEach((input) => {
          if (input.type !== "file") {
            input.setAttribute("value", input.value);
          }
        });

        const width = Math.ceil(page.offsetWidth);
        clone.style.width = `${width}px`;
        clone.style.minHeight = "auto";
        clone.style.margin = "0";

        const wrapper = document.createElement("div");
        wrapper.style.position = "fixed";
        wrapper.style.left = "-99999px";
        wrapper.style.top = "0";
        wrapper.style.width = `${width}px`;
        wrapper.appendChild(clone);
        document.body.appendChild(wrapper);

        const height = Math.ceil(clone.scrollHeight);
        const css = Array.from(document.querySelectorAll("style"))
          .map((style) => style.textContent)
          .join("\n");
        const markup = new XMLSerializer().serializeToString(clone);
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
            <foreignObject width="100%" height="100%">
              <div xmlns="http://www.w3.org/1999/xhtml">
                <style>${css}</style>
                ${markup}
              </div>
            </foreignObject>
          </svg>
        `;
        wrapper.remove();

        const image = await readImage(`data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`);
        if (!image) {
          throw new Error("图片生成失败，请稍后再试");
        }

        const scale = Math.min(2, window.devicePixelRatio || 1);
        const canvas = document.createElement("canvas");
        canvas.width = width * scale;
        canvas.height = height * scale;
        const ctx = canvas.getContext("2d");
        ctx.scale(scale, scale);
        ctx.fillStyle = "#f5f6f7";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(image, 0, 0, width, height);
        return canvas;
      }

      generateImageBtn.addEventListener("click", async () => {
        generateImageBtn.disabled = true;
        generateImageBtn.textContent = "生成中...";
        try {
          await generateReceiptImage();
          generateImageBtn.textContent = "重新生成图片";
        } catch (error) {
          alert(error.message);
          generateImageBtn.textContent = "生成图片";
        } finally {
          generateImageBtn.disabled = false;
        }
      });

      closePreviewBtn.addEventListener("click", () => {
        imagePreview.classList.remove("show");
      });
    </script>
  </body>
</html>
