<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>羽毛球活动收款</title>
    <style>
      :root {
        --wechat: #07c160;
        --wechat-dark: #05a957;
        --bg: #f5f6f7;
        --card: #ffffff;
        --soft: #f6f7f8;
        --text: #17191d;
        --muted: #8b9098;
        --line: #edf0f2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
      }

      body {
        color: var(--text);
        font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .page {
        width: min(760px, 100%);
        margin: 0 auto;
        min-height: 100dvh;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
        background: var(--bg);
      }

      .hero {
        padding: 32px 22px 76px;
        color: #fff;
        text-align: center;
        background: linear-gradient(180deg, #14d56f 0%, var(--wechat) 100%);
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 5vw, 32px);
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: 0.5px;
        opacity: 0.95;
      }

      .main-amount {
        margin-top: 16px;
      }

      .amount-label {
        font-size: 19px;
        font-weight: 600;
        opacity: 0.92;
      }

      .amount-value {
        display: block;
        margin-top: 0;
        font-size: clamp(32px, 8vw, 60px);
        line-height: 1.2;
        font-weight: 900;
        letter-spacing: -0.5px;
      }

      .amount-label-small {
        font-size: 0.67em; /* 约 2/3 大小 */
        font-weight: 600;
        margin-right: 2px;
      }

      .amount-sep {
        margin: 0 4px;
        opacity: 0.6;
      }

      .amount-tip {
        margin: 12px 0 0;
        font-size: 15px;
        opacity: 0.82;
      }

      .content {
        margin-top: -54px;
        padding: 0 16px;
        display: grid;
        gap: 10px;
      }

      .card {
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 10px 30px rgba(32, 38, 46, 0.06);
        overflow: hidden;
      }

      .qr-card {
        padding: 16px 18px 14px;
        text-align: center;
      }

      .pay-recommend {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        color: var(--text);
        font-size: 20px;
        font-weight: 800;
      }

      .wechat-dot {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #fff;
        background: var(--wechat);
        font-size: 18px;
        font-weight: 900;
      }

      .qr-box {
        position: relative;
        display: block;
        width: 55.55%; /* 占页面宽度的 5/9 */
        min-width: 160px;
        aspect-ratio: 825 / 880; /* 长宽比 825:880 */
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        overflow: hidden;
        cursor: pointer;
      }

      .qr-placeholder {
        position: absolute;
        inset: 0;
        border-radius: 0;
        background:
          radial-gradient(circle at 73% 20%, #d5d9dc 0 9%, transparent 9.5%),
          linear-gradient(33deg, #07c160 0 43%, transparent 43.5%),
          linear-gradient(151deg, transparent 0 53%, #22c982 53.5% 100%),
          linear-gradient(22deg, transparent 0 58%, #40a9ff 58.5% 100%),
          #f7faf9;
      }

      .qr-box img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: auto;
        object-fit: contain;
        object-position: top left;
        display: none;
        background: #fff;
      }

      .qr-box.has-image .qr-placeholder {
        display: none;
      }

      .qr-box.has-image img {
        display: block;
      }

      .qr-box input {
        display: none;
      }

      .qr-tip {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
      }

      .mode-card {
        padding: 8px;
      }

      .capture-source .mode-card,
      .capture-source .generate-action {
        display: none;
      }

      .mode-switch {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        border-radius: 18px;
        background: var(--soft);
        padding: 5px;
      }

      .mode-btn {
        min-height: 38px;
        border: 0;
        border-radius: 14px;
        color: #697077;
        background: transparent;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
      }

      .mode-btn.active {
        color: #fff;
        background: var(--wechat);
      }

      .form-card {
        padding: 0;
      }

      .input-row {
        min-height: 50px;
        padding: 0 24px;
        display: grid;
        grid-template-columns: 88px 1fr;
        align-items: center;
        gap: 4px;
        border-bottom: 1px solid var(--line);
        font-size: 17px;
        font-weight: 400;
        white-space: nowrap;
      }

      .input-row > span:first-child {
        font-size: 19px;
        font-weight: 400;
        color: var(--text);
      }

      .row-content {
        display: flex;
        align-items: baseline; /* 核心：父容器也必须是 baseline 对齐 */
        justify-content: flex-end;
        gap: 2px;
        min-width: 0;
        font-weight: 400;
        white-space: nowrap;
      }

      .input-row:last-child {
        border-bottom: 0;
      }

      .people-row.equal .female-person,
      .people-row.equal .male-label {
        display: none;
      }

      .people-row.equal {
        justify-content: flex-start;
      }

      .summary-detail {
        padding: 12px 24px;
        background: #fdfdfd;
        border-top: 1px dashed var(--line);
      }

      .summary-detail-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 13px;
        color: var(--muted);
        flex-wrap: wrap;
        gap: 8px;
      }

      .summary-total-inline {
        color: var(--text);
        font-weight: 500;
        white-space: nowrap;
      }

      .summary-total-inline strong {
        color: #ff4d4f;
        font-size: 16px;
        margin-left: 2px;
      }

      @media (max-width: 360px) {
        .summary-detail-row {
          flex-direction: column;
          align-items: flex-end;
          gap: 4px;
        }
      }

      .inline-input {
        width: 5ch;
        height: 1.2em; /* 显式设置高度与行高匹配 */
        margin: 0 3px;
        padding: 0;
        border: 0;
        border-bottom: 2px solid #d7dde1;
        border-radius: 0;
        color: var(--text);
        background: transparent;
        outline: none;
        font-size: 17px;
        font-weight: 400;
        text-align: center;
        appearance: none;
        -webkit-appearance: none;
        vertical-align: baseline;
        line-height: normal; /* 让浏览器自动处理基线 */
        display: inline-block;
      }

      .inline-input:focus {
        border-bottom-color: var(--wechat);
      }

      .inline-input.short {
        /* 移除特定的宽度覆盖，统一使用 4 个数字宽度 */
      }

      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        margin: 0;
        appearance: none;
      }

      .derived-pill {
        margin-left: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        color: var(--wechat-dark);
        background: #e9f8ef;
        font-size: 15px;
        font-weight: 500;
      }

      .result-card {
        padding: 18px 20px;
      }

      .result-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .result-title {
        margin: 0;
        font-size: 20px;
        font-weight: 800;
      }

      .auto-badge {
        padding: 7px 12px;
        border-radius: 999px;
        color: var(--wechat-dark);
        background: #dff8e9;
        font-size: 13px;
        font-weight: 800;
      }

      .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .result-grid.equal {
        grid-template-columns: 1fr;
      }

      .result-box {
        min-height: 92px;
        padding: 14px;
        border-radius: 20px;
        background: var(--soft);
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }

      .result-box.hidden {
        display: none;
      }

      .result-box span {
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
      }

      .result-box strong {
        margin-top: 5px;
        font-size: clamp(28px, 6vw, 40px);
        line-height: 1;
        font-weight: 900;
      }

      .footer {
        padding: 8px 0 0;
        color: #7a8088;
        text-align: center;
        font-size: 14px;
      }

      .generate-btn {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 18px;
        color: #fff;
        background: var(--wechat);
        cursor: pointer;
        font-size: 16px;
        font-weight: 800;
      }

      .generate-btn:active {
        background: var(--wechat-dark);
      }

      .generate-action {
        padding: 2px 0 0;
      }

      .image-preview {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        padding: max(10px, env(safe-area-inset-top)) 12px max(10px, env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.72);
        overflow: auto;
        text-align: center;
      }

      .image-preview.show {
        display: block;
      }

      .preview-close {
        position: sticky;
        top: 0;
        margin: 0 auto 8px;
        min-height: 36px;
        border: 0;
        border-radius: 999px;
        padding: 0 18px;
        color: #fff;
        background: rgba(255, 255, 255, 0.18);
        font-size: 15px;
        font-weight: 800;
      }

      .image-preview img {
        width: auto;
        max-width: 100%;
        max-height: calc(100dvh - 82px);
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.26);
        background: #fff;
      }

      .image-preview p {
        margin: 10px 0 0;
        color: rgba(255, 255, 255, 0.86);
        font-size: 14px;
        font-weight: 700;
      }

      @media (max-width: 560px) {
        .hero {
          padding: 20px 18px 72px;
        }

        .amount-label {
          font-size: 18px;
        }

        .amount-tip {
          font-size: 14px;
        }

        .content {
          margin-top: -50px;
          padding: 0 12px;
          gap: 9px;
        }

        .card {
          border-radius: 22px;
        }

        .qr-card {
          padding: 14px 16px 12px;
        }

        .pay-recommend {
          font-size: 18px;
        }

        .qr-box {
          width: 55.55%;
          min-width: 150px;
        }

        .input-row {
          min-height: 50px;
          padding: 0 16px;
          grid-template-columns: 72px 1fr;
          flex-wrap: wrap;
          row-gap: 4px;
          font-size: 16px;
          white-space: normal;
        }

        .input-row > span:first-child {
          font-size: 18px;
        }

        .row-content {
          flex-wrap: wrap;
          justify-content: flex-end;
          row-gap: 4px;
          white-space: normal;
          align-items: baseline;
        }

        .inline-input {
          width: 5ch;
          height: 1.2em;
          font-size: 16px;
          vertical-align: baseline;
        }

        .inline-input.short {
          /* 统一宽度 */
        }

        .derived-pill {
          margin-left: 4px;
          font-size: 15px;
        }

        .result-card {
          padding: 16px;
        }

        .result-grid {
          gap: 10px;
        }

        .result-box {
          min-height: 88px;
          padding: 14px;
        }

        .result-box span {
          font-size: 13px;
        }
      }

      @media (max-width: 390px) {
        .input-row {
          font-size: 15px;
        }

        .inline-input {
          width: 5ch;
          font-size: 16px;
        }

        .inline-input.short {
          /* 统一宽度 */
        }

        .result-grid:not(.equal) {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>羽毛球活动收款1.1</h1>
        <div class="main-amount">
          <strong class="amount-value" id="mainAmountText">每人应付：¥0</strong>
        </div>
        <p class="amount-tip">填写人数和费用后自动计算应付金额</p>
      </section>

      <section class="content">
        <section class="card qr-card">
          <label class="qr-box has-image" id="qrBox" title="点击切换收款二维码">
            <span class="qr-placeholder"></span>
            <img id="qrPreview" src="qr.png" alt="收款二维码" />
            <input id="qrInput" type="file" accept="image/*" />
          </label>
        </section>

        <section class="card mode-card">
          <div class="mode-switch" aria-label="分摊模式">
            <button class="mode-btn active" id="equalModeBtn" type="button">全场AA模式</button>
            <button class="mode-btn" id="halfModeBtn" type="button">女球减半模式</button>
          </div>
        </section>

        <section class="card form-card">
          <div class="input-row">
            <span>场地：</span>
            <div class="row-content">
              <input class="inline-input short" id="courtCount" type="number" min="0" max="999" step="1" />
              <span>小时场地，</span>
              <input class="inline-input" id="hourlyPrice" type="number" min="0" max="999" step="1" />
              <span>元/时</span>
            </div>
          </div>

          <div class="input-row">
            <span>球费：</span>
            <div class="row-content">
              <input class="inline-input" id="tubePrice" type="number" min="0" max="999" step="1" />
              <span>元/桶，用</span>
              <input class="inline-input short" id="usedBalls" type="number" min="0" max="999" step="1" />
              <span>个</span>
            </div>
          </div>

          <div class="input-row people-row" id="peopleRow">
            <span>人数：</span>
            <div class="row-content">
              <span class="male-label" id="maleLabel">男生：</span>
              <input class="inline-input short" id="maleCount" type="number" min="0" max="999" step="1" />
              <span>人</span>
              <span class="female-person">女生：</span>
              <input class="inline-input short female-person" id="femaleCount" type="number" min="0" max="999" step="1" />
              <span class="female-person">人</span>
            </div>
          </div>

          <div class="summary-detail">
            <div class="summary-detail-row">
              <span id="summaryDetailText">场地费 0 元 + 球费 0 元</span>
              <span class="summary-total-inline">总计 <strong id="summaryTotalText">¥0</strong></span>
            </div>
          </div>
        </section>

        <section class="generate-action">
          <button class="generate-btn" id="generateImageBtn" type="button">生成图片（修改默认收款人联系群友 yumao360）</button>
        </section>
      </section>
    </main>

    <section class="image-preview" id="imagePreview" aria-label="生成的收款图片">
      <button class="preview-close" id="closePreviewBtn" type="button">关闭预览</button>
      <img id="generatedImage" alt="生成的羽毛球活动收款图片" />
      <p>长按图片保存，或转发到微信群</p>
    </section>

    <script>
      const fields = {
        courtCount: document.getElementById("courtCount"),
        hourlyPrice: document.getElementById("hourlyPrice"),
        tubePrice: document.getElementById("tubePrice"),
        usedBalls: document.getElementById("usedBalls"),
        maleCount: document.getElementById("maleCount"),
        femaleCount: document.getElementById("femaleCount"),
      };

      const modeButtons = {
        equal: document.getElementById("equalModeBtn"),
        half: document.getElementById("halfModeBtn"),
      };

      const output = {
        mainAmountText: document.getElementById("mainAmountText"),
        peopleRow: document.getElementById("peopleRow"),
        summaryDetailText: document.getElementById("summaryDetailText"),
        summaryTotalText: document.getElementById("summaryTotalText"),
      };

      const generateImageBtn = document.getElementById("generateImageBtn");
      const imagePreview = document.getElementById("imagePreview");
      const closePreviewBtn = document.getElementById("closePreviewBtn");
      const generatedImage = document.getElementById("generatedImage");

      let splitMode = "equal";

      function numberValue(input) {
        const value = Number(input.value);
        return Number.isFinite(value) && value > 0 ? value : 0;
      }

      function money(value) {
        if (!Number.isFinite(value)) return "0";
        return Number.isInteger(value) ? String(value) : value.toFixed(2);
      }

      function yuan(value) {
        return `¥${money(value)}`;
      }

      // 页面加载完成后，处理默认二维码的显示状态
      window.addEventListener('load', () => {
        const qrImg = document.getElementById('qrPreview');
        if (qrImg.src && !qrImg.src.startsWith('data:')) {
          // 在本地 file:// 协议下，严禁对 img 进行任何 Canvas 转换操作
          // 只要图片加载完成，我们就添加 has-image 类来显示它
          if (qrImg.complete) {
            document.querySelector('.qr-box').classList.add('has-image');
          } else {
            qrImg.onload = () => document.querySelector('.qr-box').classList.add('has-image');
          }
          console.log('检测到本地默认二维码，已就绪');
        }
      });

      function calculate() {
        const courtCount = numberValue(fields.courtCount);
        const hourlyPrice = numberValue(fields.hourlyPrice);
        const tubePrice = numberValue(fields.tubePrice);
        const usedBalls = numberValue(fields.usedBalls);
        const maleCount = numberValue(fields.maleCount);
        const femaleCount = numberValue(fields.femaleCount);
        const courtTotal = courtCount * hourlyPrice;
        const ballTotal = (tubePrice / 12) * usedBalls;
        const peopleCount = splitMode === "equal" ? maleCount : maleCount + femaleCount;
        const ballUnits = splitMode === "half" ? maleCount + femaleCount * 0.5 : peopleCount;

        const courtEach = peopleCount > 0 ? courtTotal / peopleCount : 0;
        const maleBallEach = ballUnits > 0 ? ballTotal / ballUnits : 0;
        const femaleBallEach = splitMode === "half" ? maleBallEach * 0.5 : maleBallEach;
        const grandTotal = courtTotal + ballTotal;
        const malePay = courtEach + maleBallEach;
        const femalePay = courtEach + femaleBallEach;
        const equalPay = peopleCount > 0 ? grandTotal / peopleCount : 0;

        output.summaryDetailText.textContent = `场地费 ${money(courtTotal)} 元 + 球费 ${money(ballTotal)} 元`;
        output.summaryTotalText.textContent = yuan(grandTotal);

        output.peopleRow.classList.toggle("equal", splitMode === "equal");

        if (splitMode === "equal") {
          output.mainAmountText.innerHTML = `<span class="amount-label-small">每人应付：</span>${yuan(equalPay)}`;
        } else {
          output.mainAmountText.innerHTML = `<span class="amount-label-small">男：</span>${yuan(malePay)}<span class="amount-sep">/</span><span class="amount-label-small">女：</span>${yuan(femalePay)}`;
        }
      }

      function setMode(nextMode) {
        splitMode = nextMode;
        modeButtons.equal.classList.toggle("active", splitMode === "equal");
        modeButtons.half.classList.toggle("active", splitMode === "half");
        calculate();
      }

      Object.values(fields).forEach((field) => {
        field.addEventListener("input", calculate);
      });

      modeButtons.equal.addEventListener("click", () => setMode("equal"));
      modeButtons.half.addEventListener("click", () => setMode("half"));

      calculate();

      document.getElementById("qrInput").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        const preview = document.getElementById("qrPreview");
        const box = document.getElementById("qrBox");
        reader.addEventListener("load", () => {
          preview.src = reader.result;
          box.classList.add("has-image");
        });
        reader.readAsDataURL(file);
      });

      async function generateReceiptImage() {
        const page = document.querySelector(".page");
        const originalImg = document.getElementById("qrPreview");
        
        // 1. 核心改进：如果是本地图片，我们直接通过 img 标签预览，不再尝试导出 canvas
        // 这样可以绕过 toDataURL 的安全报错
        const isLocalFile = window.location.protocol === 'file:';
        const isDefaultQR = originalImg.src && !originalImg.src.startsWith('data:');

        const width = page.offsetWidth;
        const clone = page.cloneNode(true);
        clone.classList.add("capture-source");
        // 关键：移除克隆节点的最小高度和底部间距，确保紧贴内容
        clone.style.minHeight = "auto";
        clone.style.paddingBottom = "20px"; // 只保留少许边距美观
        clone.style.height = "auto";
        
        // 隐藏不需要出现在图片中的元素
        const actionArea = clone.querySelector(".generate-action");
        if (actionArea) actionArea.style.display = "none";
        
        const modeSwitch = clone.querySelector(".mode-switch");
        if (modeSwitch) modeSwitch.style.display = "none";

        const clonedImg = clone.querySelector("#qrPreview");
        
        // 只有 Base64 图片才放入 SVG 渲染，本地图片移除 src
        if (originalImg.src.startsWith("data:")) {
          clonedImg.src = originalImg.src;
        } else {
          clonedImg.removeAttribute('src');
          clonedImg.style.display = 'none';
        }

        clone.querySelectorAll("input").forEach((input) => {
          // 获取原始输入框的显示状态
          const originalInput = page.querySelector(`#${input.id}`);
          const isHidden = originalInput && window.getComputedStyle(originalInput).display === 'none';
          
          const span = document.createElement("span");
          span.textContent = input.value || "0";
          span.className = input.className;
          span.style.borderBottom = "1px solid #ddd";
          span.style.display = isHidden ? "none" : "inline-block";
          span.style.minWidth = "4ch";
          span.style.textAlign = "center";
          span.style.verticalAlign = "baseline";
          span.style.lineHeight = "1";
          input.parentNode.replaceChild(span, input);
        });

        const wrapper = document.createElement("div");
        wrapper.style.position = "fixed";
        wrapper.style.left = "-99999px";
        wrapper.style.top = "0";
        wrapper.style.width = `${width}px`;
        wrapper.appendChild(clone);
        document.body.appendChild(wrapper);

        // 使用 getBoundingClientRect 获取精确的内容高度
        const contentHeight = clone.getBoundingClientRect().height;
        const height = Math.ceil(contentHeight);
        
        const css = Array.from(document.querySelectorAll("style"))
          .map((style) => style.textContent)
          .join("\n");
        const markup = new XMLSerializer().serializeToString(clone);
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
            <foreignObject width="100%" height="100%">
              <div xmlns="http://www.w3.org/1999/xhtml">
                <style>${css}</style>
                ${markup}
              </div>
            </foreignObject>
          </svg>
        `;
        wrapper.remove();

        const image = await readImage(`data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`);
        if (!image) {
          throw new Error("图片生成失败");
        }

        const scale = 2; // 固定 2 倍清晰度
        const canvas = document.createElement("canvas");
        canvas.width = width * scale;
        canvas.height = height * scale;
        const ctx = canvas.getContext("2d");
        ctx.scale(scale, scale);
        ctx.fillStyle = "#f5f6f7";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(image, 0, 0, width, height);

        // 3. 补绘二维码
        if (originalImg && originalImg.naturalWidth > 0) {
          const qrBox = document.getElementById("qrBox");
          const qrRect = qrBox.getBoundingClientRect();
          const pageRect = page.getBoundingClientRect();

          const x = qrRect.left - pageRect.left;
          const y = qrRect.top - pageRect.top;
          const w = qrRect.width;
          const h = qrRect.height;

          // 按照 CSS 逻辑：宽度 100% (w)，高度按比例缩放
          const imgAspect = originalImg.naturalWidth / originalImg.naturalHeight;
          const drawW = w;
          const drawH = w / imgAspect;

          ctx.save();
          // 创建裁剪区域 (qr-box 的范围)
          ctx.beginPath();
          ctx.rect(x, y, w, h);
          ctx.clip();
          // 从左上角 (x, y) 开始绘制，模拟 object-fit: contain; object-position: top left;
          ctx.drawImage(originalImg, x, y, drawW, drawH);
          ctx.restore();
        }

        // 4. 处理导出
        try {
          const dataUrl = canvas.toDataURL("image/png");
          generatedImage.src = dataUrl;
          imagePreview.classList.add("show");
        } catch (e) {
          console.error("Canvas 导出失败:", e);
          if (isLocalFile && isDefaultQR) {
            // 如果是因为本地默认二维码导致的污染，我们切换到“纯 DOM 预览”模式
            showDomPreview(canvas, originalImg);
          } else {
            throw e;
          }
        }
      }

      // 新增：DOM 预览模式，直接把 Canvas 和原始二维码叠加显示
      function showDomPreview(canvas, originalImg) {
        const qrBox = document.getElementById("qrBox");
        const qrRect = qrBox.getBoundingClientRect();
        const pageRect = document.querySelector(".page").getBoundingClientRect();
        
        // 创建一个临时的容器来承载最终画面
        const container = document.createElement("div");
        container.style.position = "relative";
        container.style.width = `${canvas.width / 2}px`;
        container.style.height = `${canvas.height / 2}px`;
        container.style.margin = "0 auto";
        container.style.boxShadow = "0 4px 12px rgba(0,0,0,0.15)";
        
        // 底层是渲染好的文字内容（Canvas）
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        container.appendChild(canvas);
        
        // 顶层覆盖一个模拟 .qr-box 的容器（绕过安全限制）
        const qrOverlayContainer = document.createElement("div");
        qrOverlayContainer.style.position = "absolute";
        qrOverlayContainer.style.left = `${qrRect.left - pageRect.left}px`;
        qrOverlayContainer.style.top = `${qrRect.top - pageRect.top}px`;
        qrOverlayContainer.style.width = `${qrRect.width}px`;
        qrOverlayContainer.style.height = `${qrRect.height}px`;
        qrOverlayContainer.style.overflow = "hidden";
        qrOverlayContainer.style.background = "#fff";
        
        const qrOverlayImg = new Image();
        qrOverlayImg.src = originalImg.src;
        qrOverlayImg.style.width = "100%";
        qrOverlayImg.style.height = "auto";
        qrOverlayImg.style.display = "block";
        
        qrOverlayContainer.appendChild(qrOverlayImg);
        container.appendChild(qrOverlayContainer);
        
        // 清空并更新预览区域
        const imagePreview = document.getElementById("imagePreview");
        const generatedImage = document.getElementById("generatedImage");
        generatedImage.style.display = "none"; // 隐藏原本的 img 标签
        
        // 移除旧的 DOM 预览（如果有）
        const oldDom = imagePreview.querySelector(".dom-preview-wrap");
        if (oldDom) oldDom.remove();
        
        const wrap = document.createElement("div");
        wrap.className = "dom-preview-wrap";
        wrap.appendChild(container);
        imagePreview.insertBefore(wrap, imagePreview.querySelector("p"));
        
        imagePreview.classList.add("show");
        
        // 提示用户
        const tip = imagePreview.querySelector("p");
        tip.innerHTML = '<span style="color:#ff4d4f">由于浏览器安全限制，当前使用默认二维码预览。</span><br/>请截图保存，或点击二维码手动上传您的收款码以支持长按保存。';
      }

      function readImage(src) {
        return new Promise((resolve) => {
          if (!src) {
            resolve(null);
            return;
          }
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => resolve(null);
          image.src = src;
        });
      }



      generateImageBtn.addEventListener("click", async () => {
        generateImageBtn.disabled = true;
        generateImageBtn.textContent = "生成中...";
        try {
          await generateReceiptImage();
          generateImageBtn.textContent = "重新生成图片";
        } catch (error) {
          console.error("生成失败详情:", error);
          // 如果 canvas 包含了本地图片（Tainted），直接 toDataURL 会报错
          if (error.name === 'SecurityError' || error.message.includes('Tainted canvases')) {
            alert("由于浏览器安全限制，默认二维码无法直接导出。请先点击二维码区域手动上传一次您的收款码图片，然后再生成。");
          } else {
            alert("生成图片失败: " + error.message);
          }
          generateImageBtn.textContent = "生成图片";
        } finally {
          generateImageBtn.disabled = false;
        }
      });

      closePreviewBtn.addEventListener("click", () => {
        imagePreview.classList.remove("show");
        // 恢复 generatedImage 的显示并移除 DOM 预览
        generatedImage.style.display = "block";
        const oldDom = imagePreview.querySelector(".dom-preview-wrap");
        if (oldDom) oldDom.remove();
        const tip = imagePreview.querySelector("p");
        tip.innerHTML = '长按图片保存，或转发到微信群';
      });
    </script>
  </body>
</html>
